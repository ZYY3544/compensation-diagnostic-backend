services:
  - type: web
    name: compensation-diagnostic-backend
    runtime: python
    pythonVersion: 3.12.7   # 锁 3.12；不锁的话 Render 默认跳到 3.14，openpyxl 会崩
    repo: https://github.com/ZYY3544/compensation-diagnostic-backend
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-5.4-mini
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
